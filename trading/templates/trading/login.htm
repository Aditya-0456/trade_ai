<!DOCTYPE html>
<html>
<head><title>Login - AI Trader</title><style>body{font-family:sans-serif;background:#0a0a0f;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;}.card{background:#14141f;padding:40px;border-radius:16px;width:350px;border:1px solid #2a2a3e;}h2{text-align:center;margin-bottom:20px;}input{width:100%;padding:12px;margin:10px 0;background:#0a0a0f;border:1px solid #2a2a3e;color:#fff;border-radius:8px;}button{width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;}.error{color:#ef4444;text-align:center;margin-bottom:10px;}</style></head>
<body><div class="card"><h2>🤖 AI Trading Bot</h2>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="POST">{% csrf_token %}<input type="text" name="username" placeholder="Username" required><input type="password" name="password" placeholder="Password" required><button type="submit">Login</button></form><p style="text-align:center;margin-top:20px;font-size:12px;color:#666;">First run: python manage.py createsuperuser</p></div></body>
</html>
