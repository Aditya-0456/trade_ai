<!DOCTYPE html>
<html>
<head><title>Chart Analysis</title><meta charset="UTF-8"><script src="https://cdn.plot.ly/plotly-2.27.1.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;}.header{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);padding:20px;border-bottom:1px solid #2a2a3e;}.container{max-width:1400px;margin:20px auto;padding:0 20px;}.card{background:#14141f;border-radius:16px;padding:24px;margin-bottom:24px;border:1px solid #2a2a3e;}.btn{padding:10px20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;background:#6366f1;color:#fff;}.btn-success{background:#10b981;}.select{background:#0a0a0f;padding:10px;border-radius:8px;border:1px solid #2a2a3e;color:#fff;}</style></head>
<body><div class="header"><div style="max-width:1400px;margin:0 auto;"><h1>📊 Advanced Chart Analysis</h1><p style="color:#888;">AI-Powered Chart Pattern Recognition</p></div></div>
<div class="container"><div class="card"><h2>📈 Live Chart Analysis</h2><div style="display:flex;gap:10px;margin-bottom:20px;"><select id="symbolSelect" class="select"><option value="RELIANCE">RELIANCE</option><option value="HDFC">HDFC</option><option value="INFY">INFY</option><option value="ICICIBANK">ICICIBANK</option><option value="SBIN">SBIN</option><option value="TATAMOTORS">TATAMOTORS</option></select><button onclick="loadChart()" class="btn">Load Chart</button><button onclick="analyzeChart()" class="btn btn-success">AI Analysis</button></div><div id="chartContainer"></div><div id="analysisResult" style="margin-top:20px;"></div></div>
<div class="card"><h2>📤 Upload Chart Image</h2><input type="file" id="chartImage" accept="image/*" style="margin:15px0;padding:10px;"><button onclick="uploadChart()" class="btn">Analyze Image</button><div id="uploadResult" style="margin-top:20px;"></div></div></div>
<script>let csrfToken='';function getCookie(e){let n="; "+document.cookie,t=n.split("; "+e+"=");return 2===t.length?t.pop().split(";").shift():""}csrfToken=getCookie("csrftoken");async function loadChart(){let e=document.getElementById("symbolSelect").value;document.getElementById("chartContainer").innerHTML="Loading...";try{let t=await fetch(`/live-chart/${e}/`),n=await t.json();n.success?document.getElementById("chartContainer").innerHTML=n.chart:document.getElementById("chartContainer").innerHTML="Error loading chart"}catch(e){document.getElementById("chartContainer").innerHTML="Error: "+e.message}}async function analyzeChart(){let e=document.getElementById("symbolSelect").value,t=document.getElementById("analysisResult");t.innerHTML="AI analyzing chart patterns...";try{let n=await fetch(`/analyze-chart/${e}/`),s=await n.json();if(s.success){let a=s.chart_analysis,o=s.trading_signal;t.innerHTML=`<div style="background:#1a1a2e;padding:20px;border-radius:12px;"><h3>📊 Analysis Results</h3><div style="margin-top:15px;"><strong>🎯 Trading Signal:</strong> <span style="color:${o.signal==='BUY'?'#10b981':o.signal==='SELL'?'#ef4444':'#f59e0b'}">${o.signal}</span> (${(o.confidence*100).toFixed(1)}%)<br>${o.reason}</div><div style="margin-top:15px;"><strong>📈 Pattern Detection:</strong> ${a.patterns.map(p=>`<span style="display:inline-block;background:#2a2a3e;padding:4px12px;border-radius:20px;margin:4px;">${p.name} (${(p.confidence*100).toFixed(0)}%)</span>`).join("")||"No patterns detected"}</div><div style="margin-top:15px;"><strong>📉 Support/Resistance:</strong><br>Support: ${a.support_resistance.support.join(", ")||"N/A"}<br>Resistance: ${a.support_resistance.resistance.join(", ")||"N/A"}</div><div style="margin-top:15px;"><strong>📊 Market Trend:</strong><br>Direction: ${a.trend.direction}<br>Strength: ${(a.trend.strength*100).toFixed(0)}%<br>Current Price: ₹${a.trend.current_price}</div></div>`}else t.innerHTML=`Error: ${s.error}`}catch(e){t.innerHTML="Error: "+e.message}}async function uploadChart(){let e=document.getElementById("chartImage").files[0];if(!e){alert("Select an image");return}let t=new FormData;t.append("chart_image",e);let n=document.getElementById("uploadResult");n.innerHTML="Analyzing image...";try{let s=await fetch("/upload-chart/",{method:"POST",headers:{"X-CSRFToken":csrfToken},body:t}),a=await s.json();if(a.success){n.innerHTML=`<div style="background:#1a1a2e;padding:20px;border-radius:12px;"><h3>🖼️ Image Analysis</h3><div><strong>CNN Pattern:</strong> ${a.cnn_pattern.pattern} (${(a.cnn_pattern.confidence*100).toFixed(1)}%)</div><div><strong>Trendlines:</strong> ${a.computer_vision.trendlines?.length||0} detected</div><div><strong>Candlesticks:</strong> ${a.computer_vision.candlesticks||0} detected</div></div>`}else n.innerHTML=`Error: ${a.error}`}catch(e){n.innerHTML="Error: "+e.message}}loadChart();</script></body></html>
